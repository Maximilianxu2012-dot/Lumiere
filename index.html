// re-pulls it from the cloud. Nothing here ever writes to Supabase.
function maybeDemoHash() {
  const h = (window.location.hash || "").toLowerCase();
  if (h === "#demo-clear") {
    clearDemoDay();
  } else if (h === "#demo") {
    seedDemoDay();
  }
}

// â"€â"€ The Ledger â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
// Caloric ledger modeled on a private bank's transaction book.
// Each entry is a debit; running balance shows kcal remaining vs. the
// day's budget. The footer is the day's closing balance.

function formatLedgerTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}

function ledgerRow(entry) {
  const portion = entry.portion ? entry.portion.replace(/(\d+)\s*Komponenten?/, (_, n) => `${n} ${+n === 1 ? "item" : "items"}`) : "";
  const meta = `${escapeHtml(portion)} &middot; ${Math.round(entry.protein_g)}P / ${Math.round(entry.carbs_g)}C / ${Math.round(entry.fat_g)}F`;
  const expandable = entry.items && entry.items.length;
  const time = formatLedgerTime(entry.timestamp);
  const expandAttrs = expandable
    ? ` data-expandable="true" aria-expanded="false" role="button" tabindex="0"`
    : "";

  const head = `
    <div class="ledger-row" data-id="${entry.id}"${expandAttrs}>
      <div class="ledger-time">${time}</div>
      <div class="ledger-entry">
        <div class="ledger-name">${escapeHtml(entry.name)}</div>
        <div class="ledger-meta">${meta}</div>
      </div>
      <div class="ledger-debit">&#8722;${entry.calories}</div>
      <button class="ledger-del" data-id="${entry.id}" aria-label="Remove entry">×</button>
    </div>
  `;

  if (!expandable) return head;

  return head + `
    <div class="ledger-children" data-children-of="${entry.id}">
      ${entry.items.map(it => `
        <div class="ledger-child">
          <div>
            <div class="ledger-child-name">${escapeHtml(it.name)}</div>
            <div class="ledger-child-meta">${escapeHtml(it.portion)}</div>
          </div>
          <div class="ledger-child-cal">${it.calories} kcal</div>
        </div>
      `).join("")}
    </div>
  `;
}

// Round 2b — meal name from time of day.
function mealCategory(ts) {
  const dt = new Date(ts);
  const m = dt.getHours() * 60 + dt.getMinutes();
  if (m >= 300 && m < 630)  return "Breakfast";        // 05:00–10:30
  if (m >= 630 && m < 840)  return "Lunch";            // 10:30–14:00
  if (m >= 840 && m < 1020) return "Afternoon snack";  // 14:00–17:00
  if (m >= 1020 && m < 1260) return "Dinner";          // 17:00–21:00
  return "Evening snack";                              // 21:00–05:00
}

function renderLedger(entries, target) {
  const sorted = [...entries].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
  const dateLabel = new Date().toLocaleDateString("en-US", {
    day: "numeric", month: "long", year: "numeric"
  });

  // Group into meals: a new group starts when the gap from the previous entry
  // exceeds 45 minutes. Each group is labelled by its first entry's time slot.
  const GAP = 45 * 60 * 1000;
  const groups = [];
  sorted.forEach(e => {
    const last = groups[groups.length - 1];
    if (last && (e.timestamp || 0) - last.lastTs <= GAP) {
      last.entries.push(e); last.lastTs = e.timestamp || 0;
    } else {
      groups.push({ entries: [e], lastTs: e.timestamp || 0, cat: mealCategory(e.timestamp) });
    }
  });

  let balance = target;
  const rowsHtml = sorted.length
    ? groups.map(g => {
        const label = `<div class="ledger-meal-cat">${g.cat}</div>`;
        const rows = g.entries.map(e => {
          balance -= e.calories;  // still tracked for the footer summary
          return ledgerRow(e);
        }).join("");
        return label + rows;
      }).join("")
    : `<div class="ledger-empty">Nothing logged yet. Start with a scan.</div>`;

  const status = balance < 0
    ? { cls: "over", text: `${Math.abs(balance)} kcal over budget` }
    : balance < target * 0.05
      ? { cls: "within", text: "Budget reached" }
      : { cls: "", text: `${balance} kcal available` };

  return `
    <section class="ledger" aria-label="Daily Log">
      <header class="ledger-head">
        <div class="ledger-date">${dateLabel}</div>
        <div class="ledger-budget">Budget <b>${target}</b> kcal</div>
      </header>
      <div class="ledger-cols">
        <span>Time</span>
        <span>Entry</span>
        <span>Used</span>
      </div>
      ${rowsHtml}
      ${sorted.length ? `
        <footer class="ledger-foot">
          <div class="ledger-foot-label">Balance</div>
          <div class="ledger-foot-balance">${balance}</div>
          <div class="ledger-foot-status ${status.cls}">${status.text}</div>
        </footer>
      ` : ""}
    </section>
  `;
}

function deleteEntry(id) {
  const d = today();
  state.log[d] = (state.log[d] || []).filter(e => e.id !== id);
  markLogDirty(d);
  renderDashboard();
}

// ── Barcode Scan ────────────────────────────────────────────────────
function renderBarcodeScanner() {
  app.innerHTML = `
    <div class="eyebrow" style="margin-bottom:6px;">Barcode Scan</div>
    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 20px;">
      Point the camera at a barcode — I'll look it up in the Open Food Facts database.
    </p>
    <div id="barcode-reader" style="width:100%;max-width:480px;margin:0 auto;border:1px solid var(--line);"></div>
    <div id="barcode-status" style="text-align:center;padding:16px;color:var(--ink-soft);font-size:13px;"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn ghost" id="barcode-cancel">Cancel</button>
    </div>
  `;

  $("barcode-cancel").addEventListener("click", () => {
    if (window._barcodeScanner) { window._barcodeScanner.stop().catch(() => {}); window._barcodeScanner = null; }
    renderDashboard();
  });

  const status = $("barcode-status");
  status.textContent = "Starting camera…";

  try {
    window._barcodeScanner = new Html5Qrcode("barcode-reader");
    window._barcodeScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 260, height: 120 } },
      async (barcode) => {
        status.textContent = "Checking database…";
        try {
          const data = await api("/api/scan/barcode", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ barcode }),
          });
          window._barcodeScanner.stop().catch(() => {});
          window._barcodeScanner = null;
          renderFoodReview(data);
        } catch (e) {
          if (e.message && e.message.includes("not found")) {
            // Capture current video frame from the still-open camera stream
            status.textContent = "Not in database — analysing photo instead…";
            const video = document.querySelector("#barcode-reader video");
            if (video && video.videoWidth > 0) {
              const canvas = document.createElement("canvas");
              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;
              canvas.getContext("2d").drawImage(video, 0, 0);
              window._barcodeScanner.stop().catch(() => {});
              window._barcodeScanner = null;
              canvas.toBlob(async (blob) => {
                if (!blob) { renderDashboard(); return; }
                renderLoading("Analysing photo…");
                try {
                  const fd = new FormData();
                  fd.append("image", blob, "capture.jpg");
                  const scanData = await api("/api/scan/food", { method: "POST", body: fd });
                  renderFoodReview(scanData);
                  setTimeout(() => showArchitectBriefing({
                    triggered: true, type: "barcode_fallback", severity: "info",
                    message: "Couldn't find this product in the database — nutritional values estimated from the photo.",
                  }), 800);
                } catch (err) {
                  renderDashboard();
                }
              }, "image/jpeg", 0.92);
            } else {
              window._barcodeScanner.stop().catch(() => {});
              window._barcodeScanner = null;
              renderDashboard();
            }
          } else {
            window._barcodeScanner.stop().catch(() => {});
            window._barcodeScanner = null;
            renderDashboard();
          }
        }
      },
      () => {}
    ).catch(err => {
      status.textContent = `Camera error: ${err}`;
    });
  } catch (e) {
    status.textContent = `Scanner unavailable: ${e.message}`;
  }
}

async function handleFoodScan(file) {

function renderFoodReview(scan) {
  const items = scan.items.map(i => ({ ...i }));
  // Default-Name: kalorienreichste Komponente — meist das Hauptgericht
  const defaultName = items.length
    ? items.reduce((a, b) => (b.calories > a.calories ? b : a)).name
    : "Meal";
  let mealName = defaultName;

  const totals = () => items.reduce((s, i) => ({
    calories: s.calories + (+i.calories || 0),
    protein_g: s.protein_g + (+i.protein_g || 0),
    carbs_g: s.carbs_g + (+i.carbs_g || 0),
    fat_g: s.fat_g + (+i.fat_g || 0),
  }), { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0 });

  const confidenceLabel = { low: "Uncertain", medium: "Likely", high: "Confident" }[scan.confidence] || scan.confidence;
  const isLow = scan.confidence === "low";

  app.innerHTML = `
    <div class="scan-reveal">
    <div class="eyebrow">Scan Result</div>
    <div style="display:flex;align-items:center;gap:12px;margin:10px 0 24px;">
      <input id="meal-name" value="${escapeHtml(mealName)}"
        placeholder="Name this meal…"
        style="flex:1;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;
               border:0;border-bottom:1px solid var(--line);padding:4px 0;background:transparent;
               color:var(--ink);outline:none;">
      <span class="pill ${scan.confidence}" style="flex-shrink:0;">${confidenceLabel}</span>
    </div>

    <div class="scan-list" id="scan-list"></div>

    <div class="refine-box ${isLow ? "alert" : ""}" id="refine-box">
      <div class="refine-box-label">
        ${isLow
          ? "Not sure what this is — describe it briefly and I'll adjust the values."
          : "Something off? Describe it briefly — I'll correct it for you."}
      </div>
      <div class="refine-row">
        <input type="text" id="refine-input" class="refine-input"
          placeholder="${isLow ? "e.g. a chicken burrito with rice and sauce" : "e.g. this was actually a Margherita pizza"}">
        <button class="btn ghost" id="refine-btn" style="flex-shrink:0;padding:0 18px;">Adjust</button>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:baseline;
                padding:20px 0 6px;border-top:1px solid var(--line);margin-top:16px;">
      <span class="eyebrow">Total</span>
      <span style="font-family:'Cormorant Garamond',serif;font-size:26px;" id="total">${totals().calories} kcal</span>
    </div>
    <div style="font-family:'Inter',sans-serif;font-size:11px;opacity:.5;margin:0 0 18px;">
      Estimates may vary — adjust portions if needed.
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;">
      <button class="btn ghost" id="cancel">Discard</button>
      <button class="btn gold" id="save">Add to Journal</button>
    </div>
    </div>
  `;

  $("meal-name").addEventListener("input", e => { mealName = e.target.value; });

  const listEl = $("scan-list");
  // Tap-to-edit: each macro number is an inline input the user can correct.
  const macroFieldStyle =
    "width:54px;border:0;border-bottom:1px solid var(--line);background:transparent;" +
    "color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;text-align:right;" +
    "padding:2px 0;outline:none;-moz-appearance:textfield;";
  const macroField = (idx, field, val) =>
    `<input type="number" inputmode="decimal" min="0" step="0.1"
       data-idx="${idx}" data-field="${field}" value="${val}"
       style="${macroFieldStyle}" aria-label="${field}">`;

  function refreshTotals() {
    const t = totals();
    $("total").textContent = `${Math.round(t.calories)} kcal`;
  }

  function paint() {
    listEl.innerHTML = items.map((item, idx) => `
      <div class="scan-item" style="align-items:flex-start;">
        <div class="scan-item-info">
          <div class="scan-item-name">${escapeHtml(item.name)}</div>
          <div class="scan-item-portion">${escapeHtml(item.portion)}</div>
          <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;
                      font-family:'Inter',sans-serif;font-size:11px;color:var(--ink-mute);">
            <label style="display:flex;align-items:center;gap:4px;">${macroField(idx, "calories", item.calories)} kcal</label>
            <label style="display:flex;align-items:center;gap:4px;">P ${macroField(idx, "protein_g", item.protein_g)}</label>
            <label style="display:flex;align-items:center;gap:4px;">C ${macroField(idx, "carbs_g", item.carbs_g)}</label>
            <label style="display:flex;align-items:center;gap:4px;">F ${macroField(idx, "fat_g", item.fat_g)}</label>
          </div>
          ${item.confidence === "low" && item.calories_range
            ? `<div style="font-family:'Inter',sans-serif;font-size:11px;opacity:.5;margin-top:6px;">
                 Low confidence — likely ${escapeHtml(item.calories_range)} kcal.
               </div>`
            : ""}
        </div>
        <div class="scan-item-right">
          <button class="scan-item-del" data-rm="${idx}" aria-label="Remove">×</button>
        </div>
      </div>
    `).join("");

    listEl.querySelectorAll("[data-rm]").forEach(b => b.addEventListener("click", () => {
      items.splice(+b.dataset.rm, 1);
      paint();
      refreshTotals();
    }));

    listEl.querySelectorAll("input[data-field]").forEach(inp => {
      inp.addEventListener("input", () => {
        const idx = +inp.dataset.idx;
        const field = inp.dataset.field;
        const v = parseFloat(inp.value);
        items[idx][field] = isNaN(v) ? 0 : Math.max(v, 0);
        refreshTotals();
      });
    });
  }
  paint();

  // Refine via natural language
  $("refine-btn").addEventListener("click", async () => {
    const desc = $("refine-input").value.trim();
    if (!desc) return;
    const btn = $("refine-btn");
    btn.disabled = true;
    btn.textContent = "…";
    try {
      const refined = await api("/api/scan/refine", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ original_items: items, description: desc }),
      });
      renderFoodReview({ items: refined.items, confidence: refined.confidence });
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "Adjust";
    }
  });
  $("refine-input").addEventListener("keydown", e => {
    if (e.key === "Enter") $("refine-btn").click();
  });

  $("cancel").addEventListener("click", renderDashboard);
  $("save").addEventListener("click", () => {
    if (!items.length) return;
    const t = totals();
    const d = today();
    state.log[d] = state.log[d] || [];
    state.log[d].push({
      id: newId(),
      timestamp: Date.now(),
      source: "scan",
      name: (mealName || "").trim() || "Meal",
      portion: `${items.length} ${items.length === 1 ? "item" : "items"}`,
      calories: Math.round(t.calories),
      protein_g: Math.round(t.protein_g * 10) / 10,
      carbs_g: Math.round(t.carbs_g * 10) / 10,
      fat_g: Math.round(t.fat_g * 10) / 10,
      items: items.map(i => ({
        name: i.name,
        portion: i.portion,
        calories: +i.calories || 0,
        protein_g: +i.protein_g || 0,
        carbs_g: +i.carbs_g || 0,
        fat_g: +i.fat_g || 0,
      })),
    });
    recordMealForStreak();
    markLogDirty(d);
    renderDashboard();
    // Maya — habit-loop closure: short double haptic on every save; gold ring glow
    // unless this meal alone is heavy (then maybeAffirm pulses the ring amber instead).
    if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
    const _dayGoal = effectiveCalTarget();
    if (!(_dayGoal && t.calories > _dayGoal * 0.5)) glowRing();
    maybeAffirm({ protein_g: t.protein_g, calories: t.calories });
    checkHeavyMeal(t.calories);
    checkButler(items.map(i => ({
      name: i.name, portion: i.portion,
      calories: +i.calories || 0, protein_g: +i.protein_g || 0,
      carbs_g: +i.carbs_g || 0, fat_g: +i.fat_g || 0,
    })));

    // Butler memory — extract habit candidates from this meal in the background.
    // Fire-and-forget: never await, never block the save. (Julie)
    (async () => {
      try {
        await api("/api/memory/extract-scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            items: items.map(i => ({
              name: i.name, portion: i.portion,
              calories: +i.calories || 0, protein_g: +i.protein_g || 0,
              carbs_g: +i.carbs_g || 0, fat_g: +i.fat_g || 0,
            })),
            time_of_day: mealSlot(),
          }),
        });
        await loadMemories();  // refresh so the next Butler call has fresh context
      } catch {}
    })();
  });
}

function renderFridge() {
  app.innerHTML = `
    <section class="hero anim-up" style="text-align:left;align-items:flex-start;padding:8px 0 24px;">
      <div class="eyebrow">Sous-Chef</div>
      <h1 style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
                 font-size:clamp(30px,6vw,44px);line-height:1.1;letter-spacing:-0.01em;margin:14px 0 10px;">
        Your kitchen.
      </h1>
      <p style="color:var(--ink-soft);font-size:var(--fs-body);line-height:1.6;max-width:36ch;margin:0;">
        Scan what you have — I'll turn it into something worth eating.
      </p>
    </section>

    <div id="fridge-list"></div>
    <div id="fridge-cta" style="margin-top:24px;"></div>
    <div id="recipe-slot" style="margin-top:8px;"></div>

    <div style="margin-top:40px;">
      <button class="link-quiet" id="cancel-fridge">← Back</button>
    </div>
  `;
  $("cancel-fridge").addEventListener("click", renderDashboard);
  paintFridge();
}

function paintFridge() {
  const list = $("fridge-list");
  if (!list) return;
  if (!state.fridge.length) {
    list.innerHTML = `<p style="font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:var(--fs-h3);color:var(--ink-mute);margin:4px 0 0;">Your basket is empty.</p>`;
  } else {
    list.innerHTML = `
      <div class="tags">
        ${state.fridge.map((ing, i) => `
          <span class="tag">${escapeHtml(ing)}<span class="x" data-rm="${i}" aria-label="Remove">×</span></span>
        `).join("")}
      </div>
    `;
    list.querySelectorAll("[data-rm]").forEach(x => x.addEventListener("click", () => {
      state.fridge.splice(+x.dataset.rm, 1);
      persist();
      paintFridge();
    }));
  }
  paintFridgeCta();
}

// One primary action at a time: Scan when the basket is empty, Create once it
// has ingredients. Everything else is a quiet link, never a competing button.
function paintFridgeCta() {
  const cta = $("fridge-cta");
  if (!cta) return;
  cta.innerHTML = state.fridge.length
    ? `
      <button class="btn gold full" id="make-recipe">Create Recipe</button>
      <div style="display:flex;justify-content:center;gap:24px;margin-top:14px;flex-wrap:wrap;">
        <button class="link-quiet" id="scan-fridge">Scan more</button>
        <button class="link-quiet" id="add-manual">Add by hand</button>
        <button class="link-quiet" id="clear-fridge">Clear basket</button>
      </div>`
    : `
      <button class="btn gold full" id="scan-fridge">Scan Fridge</button>
      <div style="display:flex;justify-content:center;gap:24px;margin-top:14px;flex-wrap:wrap;">
        <button class="link-quiet" id="add-manual">Add by hand</button>
        <button class="link-quiet" id="inspire-me">Need inspiration?</button>
      </div>`;

  const sc = $("scan-fridge"); if (sc) sc.addEventListener("click", () => { if (isProUser()) pickFile(handleFridgeScan); });
  const mr = $("make-recipe"); if (mr) mr.addEventListener("click", makeRecipe);
  const am = $("add-manual");  if (am) am.addEventListener("click", openManualAdd);
  const im = $("inspire-me");  if (im) im.addEventListener("click", () => makeInspiredRecipe(renderFridge, "← Sous-Chef"));
  const cf = $("clear-fridge"); if (cf) cf.addEventListener("click", clearBasket);
}

function openManualAdd() {
  const list = $("fridge-list");
  if (!list || list.querySelector(".fridge-add-row")) return;
  const addRow = document.createElement("div");
  addRow.className = "fridge-add-row";
  addRow.innerHTML = `
    <input type="text" class="fridge-add-input" id="fridge-manual-input"
      placeholder="e.g. 4 apples, 200g rice, 2 eggs…" autocomplete="off">
    <button class="btn ghost" id="fridge-manual-add" style="flex-shrink:0;padding:0 18px;">Add</button>
  `;
  list.appendChild(addRow);
  const inp = addRow.querySelector("#fridge-manual-input");
  inp.focus();
  const doAdd = () => {
    const val = inp.value.trim();
    if (!val) return;
    val.split(",").map(v => v.trim()).filter(Boolean).forEach(v => state.fridge.push(v));
    persist();
    paintFridge();
  };
  addRow.querySelector("#fridge-manual-add").addEventListener("click", doAdd);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") doAdd(); });
}

async function clearBasket() {
  if (!state.fridge.length) return;
  const ok = await showConfirmDialog("Clear basket?", "This removes every ingredient you've added.", "Clear", "Keep");
  if (!ok) return;
  state.fridge = [];
  persist();
  paintFridge();
  const slot = $("recipe-slot"); if (slot) slot.innerHTML = "";
}

async function handleFridgeScan(file) {
  const slot = $("fridge-list");
  if (slot) slot.innerHTML = `<div class="log-empty" style="text-align:center;"><span class="loader"></span>Scanning contents…</div>`;
  try {
    const fd = new FormData();
    fd.append("image", file);
    const data = await api("/api/scan/fridge", { method: "POST", body: fd });
    // Merge quantity + name into the basket so makeRecipe respects amounts.
    const items = data.items.map(i => i.portion ? `${i.portion} ${i.name}` : i.name);
    state.fridge = [...new Set([...state.fridge, ...items])];
    persist();
    renderDishSuggestions(data.items || []);
  } catch (e) {
    const s = $("fridge-list");
    if (s) s.innerHTML = `<div class="log-empty" style="text-align:center;">${
      navigator.onLine
        ? "I couldn't read that photo. Try a clearer shot — or add items by hand."
        : "You're offline. Reconnect, or add items by hand for now."
    }</div>`;
  }
}

// Round 2c — sort detected ingredients into 5 buckets.
function fridgeBucket(cat, name) {
  const c = (cat || "").toLowerCase(), n = (name || "").toLowerCase();
  const has = (s, arr) => arr.some(w => s.includes(w));
  if (has(c, ["protein", "meat", "fish", "poultry", "egg"]) ||
      has(n, ["chicken", "beef", "pork", "egg", "fish", "salmon", "tuna", "tofu", "turkey", "shrimp", "ham", "bacon"])) return "Protein";
  if (has(c, ["veg", "vegetable", "produce", "fruit", "green"]) ||
      has(n, ["tomato", "lettuce", "spinach", "carrot", "pepper", "onion", "broccoli", "cucumber", "apple", "banana", "berry", "avocado", "garlic", "potato"])) return "Vegetables";
  if (has(c, ["dairy", "milk", "cheese"]) ||
      has(n, ["milk", "cheese", "yogurt", "yoghurt", "butter", "cream"])) return "Dairy";
  if (has(c, ["grain", "carb", "bread", "pasta", "rice", "cereal", "starch"]) ||
      has(n, ["rice", "pasta", "bread", "oats", "quinoa", "noodle", "flour", "tortilla", "cereal"])) return "Grains";
  return "Other";
}

function renderFridgeResults(items) {
  const order = ["Protein", "Vegetables", "Dairy", "Grains", "Other"];
  const buckets = {}; order.forEach(k => buckets[k] = []);
  items.forEach(it => {
    const label = it.portion ? `${it.portion} ${it.name}` : it.name;
    buckets[fridgeBucket(it.category, it.name)].push(label);
  });

  const hasP = buckets.Protein.length, hasV = buckets.Vegetables.length, hasG = buckets.Grains.length;
  const summary = !items.length ? "I couldn't make out clear ingredients — add a few by hand."
    : (hasP && hasV) ? "You have enough for a solid, high-protein meal."
    : hasP ? "Good protein on hand — add a vegetable and you're set."
    : (hasV && hasG) ? "Plenty for a light, plant-forward plate."
    : "A few things to work with — let's see what I can make.";

  const sections = order.filter(k => buckets[k].length).map(k => `

      <div style="display:flex;align-items:center;gap:8px;color:var(--ink-soft);

  app.innerHTML = `
    <section class="hero anim-up" style="text-align:left;align-items:flex-start;padding:8px 0 8px;">

      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,4.5vw,28px);
                line-height:1.3;color:var(--ink);margin:14px 0 0;max-width:24ch;">${escapeHtml(summary)}</p>

      <button class="btn gold full" id="fr-create">Create Recipe</button>
      <div style="display:flex;justify-content:center;margin-top:14px;">
        <button class="link-quiet" id="fr-add">Add more ingredients</button>
      </div>

// Generate a full recipe tailored to the chosen dish suggestion.
async function makeDishRecipe(suggestion) {
  const slot = $("recipe-slot");
  if (!slot) return;
  slot.innerHTML = `
    <div style="padding:24px 0 8px;border-top:1px solid var(--line-soft);margin-top:16px;">
      <div class="skeleton-card"><span class="loader"></span>
        Composing ${escapeHtml(suggestion.title)}…
      </div>
    </div>`;
  slot.scrollIntoView({ behavior: "smooth", block: "start" });

  try {
    const t = todayTotals();
    const remaining = Math.max(effectiveCalTarget() - t.calories, 300);
    const recipe = await api("/api/recipe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ingredients: state.fridge,
        targets: state.targets || null,
        remaining_calories: remaining,
        restrictions: state.restrictions,
        taste: state.taste,
        dish_hint: suggestion.title,
      }),
    });
    slot.innerHTML = `<div style="padding-top:16px;border-top:1px solid var(--line-soft);margin-top:8px;">${recipeHtml(recipe)}</div>`;
    wireRecipeButtons(recipe);
  } catch {
    slot.innerHTML = `
      <div style="padding:16px 0;color:var(--ink-soft);font-size:14px;text-align:center;">
        ${navigator.onLine
          ? "Couldn't compose the recipe right now. Tap the dish again to retry."
          : "You're offline — reconnect and try again."}
      </div>`;
  }
}

async function makeRecipe() {
  const slot = $("recipe-slot");
  slot.innerHTML = `<div class="skeleton-card"><span class="loader"></span>Composing recipe…</div>`;
  try {
    const t = todayTotals();
    // Guard: a user who skipped plan-building has no state.targets.
    const remaining = Math.max(effectiveCalTarget() - t.calories, 300);
    const recipe = await api("/api/recipe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ingredients: state.fridge,
        targets: state.targets || null,
        remaining_calories: remaining,
        restrictions: state.restrictions,
        taste: state.taste,

// Wire save/log/close on an already-rendered recipe block.
function wireRecipeButtons(r) {
  $("recipe-back").addEventListener("click", () => $("recipe-slot").innerHTML = "");
  $("recipe-save").addEventListener("click", () => {
    const idx = state.favorites.findIndex(f => f.title === r.title);
    if (idx >= 0) {
      state.favorites.splice(idx, 1);
      $("recipe-save").textContent = "☆ Save";
    } else {
      state.favorites.unshift({ ...r, id: newId(), savedAt: Date.now() });
      $("recipe-save").textContent = "★ Saved";
    }
    persist();
  });
  $("recipe-log").addEventListener("click", () => {
    const d = today();
    state.log[d] = state.log[d] || [];
    state.log[d].push({
      id: newId(),
      timestamp: Date.now(),
      source: "recipe",
      name: r.title,
      portion: "1 serving",
      calories: r.calories_per_serving,
      protein_g: r.protein_g,
      carbs_g: r.carbs_g,
      fat_g: r.fat_g,
    });
    state.fridge = [];           // basket clears after the recipe is logged
    recordMealForStreak();
    markLogDirty(d);
    renderDashboard();
    maybeAffirm({ protein_g: r.protein_g, calories: r.calories_per_serving });
    checkButler([{ name: r.title, portion: "1 serving",
      calories: r.calories_per_serving, protein_g: r.protein_g,
      carbs_g: r.carbs_g, fat_g: r.fat_g }]);
  });
}

function showWelcomeHint() {
  if (state.architectWelcomeShown) return;
  if (document.getElementById("butler-hint")) return;

  const hint = document.createElement("div");
  hint.id        = "butler-hint";
  hint.className = "butler-hint";
  hint.innerHTML = `
    <button class="butler-hint-close" id="hint-close" aria-label="Close">×</button>

  `;
  document.body.appendChild(hint);
  requestAnimationFrame(() => requestAnimationFrame(() => hint.classList.add("show")));

  const dismiss = () => {
    hint.classList.remove("show");
    hint.addEventListener("transitionend", () => hint.remove(), { once: true });
    state.architectWelcomeShown = true;
    persist();
    clearTimeout(_hintTimer);
  };

  let _hintTimer = setTimeout(dismiss, 8000);
  hint.querySelector("#hint-close").addEventListener("click", dismiss);
  hint.querySelector("#hint-settings").addEventListener("click", () => {
    dismiss();
    showProfilePanel();
  });
}

function showConfirmDialog(title, message, confirmLabel = "Confirm", cancelLabel = "Cancel") {
  return new Promise((resolve) => {
    const overlay = document.createElement("div");
    overlay.className = "disclaimer-overlay";
    overlay.style.zIndex = "1100";
    overlay.innerHTML = `

        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector("#confirm-cancel").addEventListener("click", () => { overlay.remove(); resolve(false); });
    overlay.querySelector("#confirm-ok").addEventListener("click",     () => { overlay.remove(); resolve(true); });
  });
}

async function resetApp() {
  const confirmed = await showConfirmDialog(
    "Reset App",
    "This will permanently delete all your data. This cannot be undone.",
    "Delete Everything",
    "Cancel"
  );
  if (!confirmed) return;

  try {
    await api("/api/user/state", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({}),
    });
  } catch { /* silent — local reset happens regardless */ }

  try { localStorage.removeItem(STORAGE_KEY); } catch {}
  state = defaultState();

  if (g.targetWeight && g.targetDate) return `${label} · ${g.targetWeight}kg`;
  return label;
}

function hideProfilePanel() {
  const panel = document.getElementById("profile-panel");
  if (!panel) return;
  panel.classList.remove("open");
  panel.addEventListener("transitionend", () => panel.remove(), { once: true });
}

// "What I know about you" — confirmed memories only (goal/habit/preference/health),
// never staging candidates. Each chip can be forgotten with a single tap. (Marcus + Julie)
const _PROFILE_MEM_CATS = ["goal", "habit", "preference", "health"];
async function renderProfileMemories() {
  await loadMemories();
  const box = document.getElementById("panel-mem-list");
  if (!box) return;  // panel may have closed while loading
  const mems = _memories.filter(m => m.memory_text && _PROFILE_MEM_CATS.includes(m.category) && m.id);
  if (!mems.length) {
    box.innerHTML = `<div class="panel-mem-empty">Still learning about you. The more you use Nouri, the sharper I get.</div>`;
    return;
  }
  box.innerHTML = mems.map(m => `
    <div class="mem-chip" data-mem="${escapeHtml(m.id)}">
      <span>${escapeHtml(m.memory_text)}</span>
      <button class="mem-chip-x" data-del="${escapeHtml(m.id)}" aria-label="Forget this">×</button>
    </div>`).join("");
  box.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.getAttribute("data-del");
    if (!id) return;
    const chip = btn.closest(".mem-chip");
    if (chip) chip.style.opacity = ".35";
    _memories = _memories.filter(m => m.id !== id);
    try { await api(`/api/memory/${id}`, { method: "DELETE" }); } catch {}
    renderProfileMemories();
  }));
}

          <button class="btn ghost" id="allergy-add" style="padding:0 20px;flex-shrink:0;">+</button>
        </div>

      <div style="margin-bottom:40px;">
        <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:10px;">

          ).join("") || `<span style="font-size:13px;color:var(--ink-mute);">None added</span>`}

    wrap.querySelector("#allergy-back").addEventListener("click", backFn || renderDashboard);

function renderCalorieGoalScreen(backFn) {
  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="eyebrow" style="margin-bottom:6px;">Calorie Goal</div>
    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 8px;line-height:1.75;">
      Override the calculated target with a custom daily goal.
    </p>
    ${state.targets ? `
      <p style="font-size:12px;color:var(--ink-mute);margin:0 0 32px;">
        Calculated from your profile: <strong style="color:var(--ink);">${state.targets.calories} kcal</strong>
      </p>` : `<div style="margin-bottom:32px;"></div>`}

    <div class="field" style="margin-bottom:8px;">
      <label class="field-label" for="cg-input">Custom Daily Goal (kcal)</label>
      <input type="number" id="cg-input" min="800" max="5000"
        placeholder="Leave empty to use calculated"
        value="${state.customCalorieGoal || ""}"
        style="font-size:20px;">
    </div>
    <div id="cg-warning" style="font-size:12px;color:var(--danger);margin-bottom:20px;display:none;">
      Please enter a value between 800 and 5000 kcal.
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px;">
      <button class="btn" id="cg-save">Save Goal</button>
      ${state.customCalorieGoal ? `<button class="btn ghost" id="cg-clear">Reset to Calculated</button>` : ""}
    </div>

    <div style="text-align:center;padding-top:8px;border-top:1px solid var(--line-soft);">
      <button class="btn ghost" id="cg-back">← Profile</button>
    </div>
  `;

  const inp  = wrap.querySelector("#cg-input");
  const warn = wrap.querySelector("#cg-warning");

  wrap.querySelector("#cg-save").addEventListener("click", () => {
    const raw = inp.value.trim();
    if (!raw) { state.customCalorieGoal = null; persist(); (backFn || renderDashboard)(); return; }
    const val = parseInt(raw, 10);
    if (isNaN(val) || val < 800 || val > 5000) { warn.style.display = "block"; return; }
    warn.style.display = "none";
    state.customCalorieGoal = val; persist();
    (backFn || renderDashboard)();
  });
  inp.addEventListener("input", () => { warn.style.display = "none"; });

  const clearBtn = wrap.querySelector("#cg-clear");
  if (clearBtn) clearBtn.addEventListener("click", () => {
    state.customCalorieGoal = null; persist();
    (backFn || renderDashboard)();
  });

  wrap.querySelector("#cg-back").addEventListener("click", backFn || renderDashboard);
  app.innerHTML = "";
  app.appendChild(wrap);
}

  { key: "lose",    label: "Lose weight" },
  { key: "gain",    label: "Build muscle" },
  { key: "maintain",label: "Maintain" },
  { key: "clean",   label: "Eat cleaner" },
];
const _GOAL_LABEL = Object.fromEntries(_GOAL_TYPES.map(g => [g.key, g.label]));

function renderGoalScreen(backFn) {
  const g = state.goals || {};
  // Default type from saved goal, else from onboarding profile goal.
  const profGoal = state.profile?.goal;
  let selType = g.type || (profGoal === "lose" ? "lose" : profGoal === "gain" ? "gain" : "maintain");
  const curWeight = state.profile?.weight_kg || "";
  const preWeight = g.targetWeight || state.goalDetails?.weight || "";
  const preDate   = g.targetDate || "";
  const minDate   = new Date(Date.now() + 7 * 864e5).toLocaleDateString('en-CA');
  const maxDate   = new Date(Date.now() + 5 * 365 * 864e5).toLocaleDateString('en-CA');

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="eyebrow" style="margin-bottom:6px;">My Goal</div>
    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 24px;line-height:1.7;">
      Set the target and the timeline. I'll work out the daily numbers and keep track.
    </p>

    <div class="field-label" style="margin-bottom:8px;">Goal</div>
    <div class="onb-choices" id="goal-types" style="margin-bottom:24px;">
      ${_GOAL_TYPES.map(o => `<button class="onb-choice${o.key === selType ? " selected" : ""}" data-g="${o.key}">${o.label}</button>`).join("")}
    </div>

    <div id="goal-weight-wrap">
      <div class="field" style="margin-bottom:18px;">
        <label class="field-label" for="goal-weight">Target weight (kg)</label>
        <input type="number" id="goal-weight" min="30" max="300" step="0.1" placeholder="e.g. 72" value="${preWeight}" style="font-size:20px;">
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label class="field-label" for="goal-date">Target date</label>
        <input type="date" id="goal-date" min="${minDate}" max="${maxDate}" value="${preDate}" style="font-size:18px;">
      </div>
    </div>

    <div id="goal-err" class="onb-err" style="min-height:0;margin-bottom:16px;"></div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px;">
      <button class="btn gold" id="goal-save">Save Goal</button>
    </div>
    <div style="text-align:center;padding-top:8px;border-top:1px solid var(--line-soft);">
      <button class="btn ghost" id="goal-back">← Profile</button>
    </div>
  `;

  const err = wrap.querySelector("#goal-err");
  const weightWrap = wrap.querySelector("#goal-weight-wrap");
  const syncWeightVisibility = () => {
    // Maintain / Eat cleaner don't need a weight target.
    weightWrap.style.display = (selType === "lose" || selType === "gain") ? "" : "none";
  };
  syncWeightVisibility();

  wrap.querySelectorAll("[data-g]").forEach(b => b.addEventListener("click", () => {
    selType = b.dataset.g;
    wrap.querySelectorAll("[data-g]").forEach(x => x.classList.toggle("selected", x === b));
    syncWeightVisibility();
    err.textContent = "";
  }));

  wrap.querySelector("#goal-save").addEventListener("click", () => {
    err.textContent = "";
    const label = _GOAL_LABEL[selType];

    // Maintain / clean: no weight math, just save the intent.
    if (selType === "maintain" || selType === "clean") {
      state.goals = { type: selType, targetWeight: null, targetDate: null,
        startWeight: state.profile?.weight_kg || null, startDate: new Date().toISOString(),
        weeklyTarget: 0, dailyCalorieAdjustment: 0, weeksRemaining: null };
      persist();
      (backFn || renderDashboard)();
      setTimeout(() => showButlerMessage(
        selType === "clean"
          ? "Eat cleaner it is. I'll flag the meals that drift and keep you honest."
          : "Maintenance mode. I'll keep you steady around your target.", 8000), 400);
      return;
    }

    const tw = parseFloat(wrap.querySelector("#goal-weight").value);
    const dateStr = wrap.querySelector("#goal-date").value;
    if (!tw || tw < 30 || tw > 300) { err.textContent = "Enter a target weight between 30 and 300 kg."; return; }
    if (tw < 40) { err.textContent = "That target weight isn't healthy. Pick a realistic goal."; return; }
    if (!dateStr) { err.textContent = "Pick a target date."; return; }
    const target = new Date(dateStr + "T00:00:00");
    const now = new Date();
    if (isNaN(target) || target <= now) { err.textContent = "Pick a future date."; return; }
    if (target.getTime() - now.getTime() > 5 * 365 * 864e5) { err.textContent = "Pick a date within the next 5 years."; return; }

    const cur = state.profile?.weight_kg;
    if (!cur) { err.textContent = "Add your current weight in setup first."; return; }
    if ((selType === "lose" && tw >= cur) || (selType === "gain" && tw <= cur)) {
      err.textContent = selType === "lose"
        ? "Target is at or above your current weight — did you mean Build muscle?"
        : "Target is at or below your current weight — did you mean Lose weight?";
      return;
    }

    const days  = (target.getTime() - now.getTime()) / 864e5;
    const weeks = days / 7;
    const diff  = Math.abs(cur - tw);
    const weeklyChange = diff / weeks;
    const cap = selType === "lose" ? 0.75 : 0.25;
    if (weeklyChange > cap) {
      const realisticWeeks = Math.ceil(diff / cap);
      err.textContent = `That's ${weeklyChange.toFixed(2)} kg/week — too fast. Give it about ${realisticWeeks} weeks.`;
      return;
    }

    const sign = selType === "lose" ? -1 : 1;
    const weeklyTarget = +(sign * weeklyChange).toFixed(2);
    const dailyCalorieAdjustment = Math.round(sign * weeklyChange * 7700 / 7); // ~7700 kcal per kg
    const weeksRemaining = Math.max(1, Math.ceil(weeks));

    state.goals = {
      type: selType, targetWeight: tw, targetDate: dateStr,
      startWeight: cur, startDate: new Date().toISOString(),
      weeklyTarget, dailyCalorieAdjustment, weeksRemaining,
    };
    persist();
    (backFn || renderDashboard)();
    const dailyKcal = Math.round(effectiveCalTarget());
    setTimeout(() => showButlerMessage(
      `${weeksRemaining} weeks to ${label.toLowerCase()}. That means staying around ${dailyKcal} kcal daily. I'll keep track.`,
      9000), 400);
  });

  wrap.querySelector("#goal-back").addEventListener("click", backFn || renderDashboard);
  app.innerHTML = "";
  app.appendChild(wrap);
}

// ── Proactive Interval System ──────────────────────────────────────────
let _weatherCache      = null;
let _locationRequested = false;
let _proactiveInterval = null;

async function initLocation() {
  if (_locationRequested) return;
  _locationRequested = true;

  // If we have coords from a previous session, fetch weather right away
  if (state.location) {
    try {
      _weatherCache = await api(`/api/weather?lat=${state.location.lat}&lon=${state.location.lon}`);
    } catch { _weatherCache = { temp: null }; }
  }

  if (!navigator.geolocation) {
    if (!_weatherCache) _weatherCache = { temp: null };
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      state.location = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      persist();
      // Re-fetch only if no cache yet (previous session coords already fetched above)
      if (!_weatherCache || _weatherCache.temp === null) {
        try {
          _weatherCache = await api(`/api/weather?lat=${state.location.lat}&lon=${state.location.lon}`);
        } catch { _weatherCache = { temp: null }; }
      }
    },
    () => { if (!_weatherCache) _weatherCache = { temp: null }; },
    { maximumAge: 300000, timeout: 10000 }
  );
}

// ISO-8601 week key (e.g. "2026-W22") — for once-per-week gating.
function isoWeekKey(d = new Date()) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (dt.getUTCDay() + 6) % 7;
  dt.setUTCDate(dt.getUTCDate() - dayNum + 3);
  const firstThu = new Date(Date.UTC(dt.getUTCFullYear(), 0, 4));
  const week = 1 + Math.round(((dt - firstThu) / 864e5 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7);
  return `${dt.getUTCFullYear()}-W${week}`;
}

// Round 3c — Sunday reflection. Two paths; "harder" saves a reflection memory.
function showWeeklyReflection() {
  const existing = document.getElementById("butler-hint");
  if (existing) existing.remove();
  const card = document.createElement("div");
  card.id = "butler-hint";
  card.className = "butler-hint";
  card.innerHTML = `
    <button class="butler-hint-close" aria-label="Close">×</button>
    <div class="butler-hint-eyebrow">${escapeHtml((state.butlerName || "Architect").toUpperCase())}</div>
    <p class="butler-hint-text">How did this week feel — on track, or harder than expected?</p>
    <div id="refl-actions" style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="butler-hint-link" data-r="ontrack">On track</button>
      <button class="butler-hint-link" data-r="hard">Harder than expected</button>
    </div>
  `;
  document.body.appendChild(card);
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add("show")));
  const close = () => {
    card.classList.remove("show");
    card.addEventListener("transitionend", () => card.remove(), { once: true });
  };
  card.querySelector(".butler-hint-close").addEventListener("click", close);

  card.querySelectorAll("[data-r]").forEach(b => b.addEventListener("click", () => {
    const txt = card.querySelector(".butler-hint-text");
    const acts = card.querySelector("#refl-actions");
    if (b.dataset.r === "ontrack") {
      txt.textContent = "Good. Keep the same approach next week.";
      acts.remove();
      setTimeout(close, 4000);
    } else {
      txt.textContent = "What got in the way?";
      acts.innerHTML = `
        <input id="refl-input" type="text" placeholder="A sentence is enough…"
          style="flex:1;min-width:0;background:rgba(255,255,255,.06);border:1px solid rgba(201,169,97,.3);
                 color:#EDE5D8;padding:9px 10px;font:400 13px/1 'Inter';outline:none;">
        <button class="butler-hint-link" id="refl-save">Save</button>`;
      const inp = acts.querySelector("#refl-input");
      inp.focus();
      const save = async () => {
        const v = inp.value.trim();
        if (!v) { close(); return; }
        const mem = { memory_text: `Weekly reflection: ${v}`, category: "reflection", expires_at: null };
        _memories.unshift({ ...mem, created_at: new Date().toISOString() });
        try { await api("/api/memory", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(mem) }); } catch {}
        txt.textContent = "Noted. We'll work around that next week.";
        acts.remove();
        setTimeout(close, 3500);
      };
      acts.querySelector("#refl-save").addEventListener("click", save);
      inp.addEventListener("keydown", e => { if (e.key === "Enter") save(); });
    }
  }));
}

function showButlerMessage(text, duration = 9000) {
  const existing = document.getElementById("butler-hint");
  if (existing) {
    existing.classList.remove("show");
    existing.remove();
  }
  const hint = document.createElement("div");
  hint.id        = "butler-hint";
  hint.className = "butler-hint";
  hint.innerHTML = `
    <button class="butler-hint-close" id="hint-close" aria-label="Close">×</button>
    <div class="butler-hint-eyebrow">${escapeHtml((state.butlerName || "Architect").toUpperCase())}</div>
    <p class="butler-hint-text">${escapeHtml(text)}</p>
  `;
  document.body.appendChild(hint);
  requestAnimationFrame(() => requestAnimationFrame(() => hint.classList.add("show")));
  const dismiss = () => {
    hint.classList.remove("show");
    hint.addEventListener("transitionend", () => hint.remove(), { once: true });
    clearTimeout(_t);
  };
  const _t = setTimeout(dismiss, duration);
  // Tap anywhere on the bubble (or the close button) to dismiss.
  hint.addEventListener("click", dismiss);
}

// Round 1c — personalized morning briefing (2–3 sentences).
function buildMorningBriefing() {
  const tgtCal  = effectiveCalTarget();
  const protTgt = state.targets?.protein_g || 0;
  const y = new Date(); y.setDate(y.getDate() - 1);
  const yEntries = state.log[y.toLocaleDateString('en-CA')] || [];

  const greet = state.name ? `Morning, ${state.name}.` : "Morning.";
  let perf;
  if (yEntries.length) {
    const yCal  = yEntries.reduce((s, e) => s + (e.calories || 0), 0);
    const yProt = yEntries.reduce((s, e) => s + (e.protein_g || 0), 0);
    if (yCal <= tgtCal && protTgt && yProt >= protTgt * 0.9)
      perf = `Yesterday landed clean — ${Math.round(yCal)} kcal with protein on target.`;
    else if (yCal > tgtCal)
      perf = `Yesterday ran ${Math.round(yCal - tgtCal)} kcal over; today's a reset.`;
    else if (protTgt && yProt < protTgt * 0.7)
      perf = `Protein fell short yesterday (${Math.round(yProt)}g) — front-load it today.`;
    else
      perf = `Yesterday: ${Math.round(yCal)} kcal logged.`;
  } else {
    perf = "Nothing logged yesterday — fresh start.";
  }
  const ev = _memories.find(m => m.category === "event");
  const tail = ev
    ? `Don't forget: ${ev.memory_text}.`
    : (state.logStreak > 1 ? `Day ${state.logStreak} of your streak — keep it going.` : "");
  return [greet, perf, tail].filter(Boolean).join(" ");
}

// Round 1d — one-sentence evening summary from real numbers.
function buildEveningSummary() {
  const t = todayTotals();
  const tgtCal  = effectiveCalTarget();
  const protTgt = state.targets?.protein_g || 0;
  const carbTgt = state.targets?.carbs_g || 0;
  const under   = t.calories <= tgtCal;
  if (protTgt && t.protein >= protTgt * 0.9 && under)
    return `Strong day — protein at ${Math.round(t.protein)}g and you stayed under your limit.`;
  if (carbTgt && t.carbs > carbTgt * 1.1)
    return `Carbs ran high today (${Math.round(t.carbs)}g). Keep tomorrow leaner in the morning.`;
  if (!under)
    return `You're ${Math.round(t.calories - tgtCal)} kcal over today — lighter tomorrow and you're fine.`;
  if (protTgt && t.protein < protTgt * 0.9)
    return `Protein came up short (${Math.round(t.protein)}g of ${protTgt}g). Worth fixing tomorrow.`;
  return `${Math.round(t.calories)} kcal logged today — steady.`;
}

async function proactiveCheck() {
  // Only run when the dashboard is visible (section-hero exists in DOM)
  if (!document.getElementById("section-hero")) return;
  if (!state.onboardingComplete || !state.targets) return;

  const d = today();
  if (!state.butlerFired || state.butlerFired.date !== d) {
    state.butlerFired = { date: d, types: [] };
  }
  const fired       = state.butlerFired.types;
  const t           = todayTotals();
  const entriesToday = (state.log[d] || []).length;
  const hour        = new Date().getHours();
  const calGoal = effectiveCalTarget();
  const pctCal  = t.calories / calGoal;
  const w       = _weatherCache;

  let msg  = null;
  let type = null;

  // Round 1c — morning briefing (6–9 AM, once). Richer than the breakfast nudge.
  if (hour >= 6 && hour < 9 && !fired.includes("morning_briefing")) {
    state.butlerFired.types.push("morning_briefing");
    persist();
    showButlerMessage(buildMorningBriefing(), 8000);
    return;
  }

  // Round 1d — evening summary (20–22, ≥2 meals, once).
  if (hour >= 20 && hour < 22 && !fired.includes("evening_summary") && entriesToday >= 2) {
    state.butlerFired.types.push("evening_summary");
    persist();
    showButlerMessage(buildEveningSummary(), 9000);
    return;
  }

  // Round 3c — weekly reflection (Sunday 18:00–20:00, once per week).
  if (new Date().getDay() === 0 && hour >= 18 && hour < 20) {
    const wk = isoWeekKey();
    if (state.lastReflectionWeek !== wk) {
      state.lastReflectionWeek = wk;
      persist();
      showWeeklyReflection();
      return;
    }
  }

  // Round 3a — streak-break acknowledgment: shown once the first time they
  // reopen after missing a day (and before they log again today).
  if (state.lastLogDate && state.lastLogDate !== d && state.streakAckDate !== d && entriesToday === 0) {
    const y = new Date(); y.setDate(y.getDate() - 1);
    const missedYesterday = state.lastLogDate !== y.toLocaleDateString('en-CA');
    if (missedYesterday && state.logStreak > 0) {
      state.streakAckDate = d;
      persist();
      showButlerMessage("Yesterday broke the streak. Today starts a new one.", 8000);
      return;
    }
  }

  // Streak milestones — a single calm acknowledgment at meaningful days.
  if (STREAK_MILESTONES.includes(state.logStreak) && !fired.includes(`streak_${state.logStreak}`)) {
    const days = state.logStreak;
    fired.push(`streak_${days}`);
    persist();
    setTimeout(() => showButlerMessage(streakMilestoneMessage(days), 9000), 600);
    // Store it so the Butler can reference the milestone naturally later.
    (async () => {
      try {
        await api("/api/memory", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            memory_text: `User reached a ${days}-day logging streak on ${today()}`,
            category: "goal",
          }),
        });
        await loadMemories();
      } catch {}
    })();
    return;
  }

  // Round 3a — lunch nudge: not logged by 13:00, only for established streaks.
  if (hour >= 13 && entriesToday === 0 && state.logStreak > 2 && !fired.includes("lunch_nudge")) {
    state.butlerFired.types.push("lunch_nudge");
    persist();
    showButlerMessage("You haven't logged yet today. Don't break the streak.", 8000);
    return;
  }

  // Alex — morning nudge: 9–10 AM, nothing logged yet, once per morning.
  if (hour >= 9 && hour < 10 && t.calories === 0 && !fired.includes("morning_breakfast")) {
    msg  = "Morning. Don't skip breakfast today.";
    type = "morning_breakfast";
  }

  if (!msg && w && w.temp !== null) {
    if (w.temp > 27 && !fired.includes("hydration")) {
      msg  = `It's ${Math.round(w.temp)}°C outside. Stay hydrated — aim for at least 2.5L today.`;
      type = "hydration";
    } else if (w.temp < 5 && !fired.includes("cold_weather")) {
      msg  = "Cold day ahead. Your body burns more calories keeping warm.";
      type = "cold_weather";
    }
  }

  if (!msg && hour >= 15 && pctCal < 0.4 && !fired.includes("calories_behind")) {
    msg  = "You've barely eaten today. Don't skip meals — it works against your goals.";
    type = "calories_behind";
  }

  if (!msg && hour >= 18 && (t.protein / (state.targets.protein_g || 1)) < 0.5 && !fired.includes("protein_low_interval")) {
    msg  = "Protein is low for today. Add a high-protein snack before the day ends.";
    type = "protein_low_interval";
  }

  if (!msg && pctCal > 0.9 && !fired.includes("calorie_limit")) {
    msg  = "You're close to your daily limit. Be mindful of your next meal.";
    type = "calorie_limit";
  }

  if (!msg && hour >= 19 && pctCal < 0.3 && !fired.includes("undereatEvening")) {
    msg  = "You've barely eaten today. Your body needs fuel even in the evening.";
    type = "undereatEvening";
  }

  if (!msg && hour >= 21 && pctCal < 0.7 && !fired.includes("end_of_day")) {
    msg  = "You've significantly under-eaten today. Consider a light meal before bed.";
    type = "end_of_day";
  }

  if (msg && type) {
    state.butlerFired.types.push(type);
    persist();
    showButlerMessage(msg);
  }
}

function startProactiveSystem() {
  if (_proactiveInterval) return;
  initLocation();
  setTimeout(() => proactiveCheck(), 30 * 1000);
  _proactiveInterval = setInterval(() => proactiveCheck(), 15 * 60 * 1000);
}

// â"€â"€ Daily Briefing â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
async function fetchDailyBriefing() {
  if (!state.targets || state.lastBriefingDate === today()) return;
  state.lastBriefingDate = today();
  persist();

  const _y = new Date(); _y.setDate(_y.getDate() - 1);

let _memories = [];   // full memory objects { memory_text, category, created_at, expires_at }

async function loadMemories() {
  try {
    const data = await api("/api/memory");
    _memories = (data.memories || []).filter(m => m && m.memory_text);
  } catch { /* offline — keep whatever we have */ }

}

// Once per day on app open: run the 30-day pattern analysis that promotes
// habit candidates into confirmed habits. Fire-and-forget. (Chen / Julie)
function maybePatternAnalysis() {
  try {
    const d = today();
    if (localStorage.getItem("_lastPatternAnalysis") === d) return;
    localStorage.setItem("_lastPatternAnalysis", d);
    (async () => {
      try {
        await api("/api/memory/analyze-patterns", { method: "POST" });
        await loadMemories();  // pull in any newly confirmed habits
      } catch {}
    })();
  } catch {}
}

// Round 1b — grouped + recency-weighted list for prompt injection.
// Order: goals → confirmed habits → health → preferences → events → reminders → reflections.
// Returns structured { memory_text, category } objects — the backend groups them
// into a labelled block. habit_candidate entries are staging and never sent.
const _MEM_ORDER = ["goal", "habit", "health", "preference", "event", "reminder", "reflection"];
function memoriesForPrompt(limit = 14) {
  const rank = c => { const i = _MEM_ORDER.indexOf(c || "event"); return i < 0 ? 99 : i; };
  const sorted = [..._memories]
    .filter(m => m.memory_text && m.category !== "habit_candidate")
    .sort((a, b) => {
      const d = rank(a.category) - rank(b.category);
      if (d !== 0) return d;
      return new Date(b.created_at || 0) - new Date(a.created_at || 0);
    });
  return sorted.slice(0, limit).map(m => ({
    memory_text: m.memory_text,
    category: m.category || "general",
  }));
}

// breakfast / lunch / dinner / snack for the scan-memory extractor.
function mealSlot() {
  const c = mealCategory(Date.now()).toLowerCase();
  if (c.includes("breakfast")) return "breakfast";
  if (c.includes("lunch"))     return "lunch";
  if (c.includes("dinner"))    return "dinner";
  return "snack";
}

// Lightweight client-side detection of time-sensitive / durable info worth
// remembering. Returns { memory_text, category, expires_at } or null.
function detectMemory(text) {
  const t = text.trim();
  if (t.length < 6) return null;
  const low = t.toLowerCase();
  const days = (n) => new Date(Date.now() + n * 864e5).toISOString();

  // Events with a time horizon → set an expiry so they self-clean.
  let m;
  if ((m = low.match(/\bin\s+(\d+)\s+days?\b/)))   return { memory_text: t, category: "event", expires_at: days(parseInt(m[1]) + 1) };
  if ((m = low.match(/\bin\s+(\d+)\s+weeks?\b/)))  return { memory_text: t, category: "event", expires_at: days(parseInt(m[1]) * 7 + 1) };
  if (/\b(tomorrow|tonight)\b/.test(low))          return { memory_text: t, category: "event", expires_at: days(2) };
  if (/\bnext week\b/.test(low))                   return { memory_text: t, category: "event", expires_at: days(8) };
  if (/\bnext month\b/.test(low))                  return { memory_text: t, category: "event", expires_at: days(32) };
  if (/\bon (monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/.test(low))
    return { memory_text: t, category: "event", expires_at: days(8) };

  // Health — durable, no expiry.
  if (/\b(allergic to|i'?m allergic|intolerant|lactose|gluten|celiac|diabet|hypertension|high blood pressure)\b/.test(low))
    return { memory_text: t, category: "health", expires_at: null };

  // Reminders.
  if (/\bremind me\b/.test(low)) return { memory_text: t, category: "reminder", expires_at: null };

  // Goals.
  if (/\b(my goal|i want to|i'?m trying to|trying to|i plan to|aiming to|i'?d like to|i need to)\b/.test(low))
    return { memory_text: t, category: "goal", expires_at: null };

  // Preferences.
  if (/\b(i (love|hate|prefer|dislike|don'?t like|can'?t stand)|i'?m (vegan|vegetarian|pescatarian))\b/.test(low))
    return { memory_text: t, category: "preference", expires_at: null };

  return null;
}

function showNoted(anchorEl) {
  const tag = document.createElement("div");
  tag.textContent = "💭 noted";
  tag.style.cssText =
    "font-family:'Inter',sans-serif;font-size:11px;opacity:0;color:var(--ink-mute);" +
    "margin:4px 2px 0;transition:opacity .3s ease;text-align:right;";
  anchorEl.appendChild(tag);
  requestAnimationFrame(() => { tag.style.opacity = ".65"; });
  setTimeout(() => {
    tag.style.opacity = "0";
    tag.addEventListener("transitionend", () => tag.remove(), { once: true });
  }, 2000);
}

async function maybeRememberFromMessage(text, anchorEl) {
  const mem = detectMemory(text);
  if (!mem) return;
  // available to this same conversation immediately
  _memories.unshift({ ...mem, created_at: new Date().toISOString() });
  try {
    await api("/api/memory", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(mem),
    });
    if (anchorEl) showNoted(anchorEl);
  } catch { /* offline — kept in cache for this session */ }
}

// Reveal Butler text word-by-word (fade in, ~20ms apart) — feels alive, not
// like a database returning a string. User messages stay instant.
function revealWords(el, text, onTick) {
  el.textContent = "";
  const words = String(text).split(/(\s+)/);  // keep whitespace tokens
  let i = 0;
  (function step() {
    if (i >= words.length) return;
    const tok = words[i++];
    if (/^\s+$/.test(tok)) { el.appendChild(document.createTextNode(tok)); return step(); }
    const span = document.createElement("span");
    span.className = "chat-word";
    span.textContent = tok;
    el.appendChild(span);
    if (onTick) onTick();
    setTimeout(step, 20);
  })();
}

function renderChat() {
  setBottomTab("butler");
  loadMemories();
  const nm = state.name ? `, ${state.name}` : "";
  const welcome = {
    ELITE_BUTLER:      `Good to see you${nm}. I have today's numbers in front of me — where would you like to begin?`,
    PERFORMANCE_COACH: `Let's work${nm}. I've got your day's numbers. What are we fixing?`,
    STRATEGIC_BUDDY:   `Hey${nm} — I'm caught up on your day. What's on your mind?`,
  }[ARCHITECT.getMode()] || "Ready when you are.";

  app.innerHTML = `
    <section class="hero-block" style="padding-bottom:20px;">
      <h1 class="hero-display" style="font-size:clamp(26px,3.5vw,42px);">${escapeHtml(state.butlerName || "Architect")}</h1>
      <p class="hero-sub" style="font-size:12px;letter-spacing:.1em;margin:0;">${escapeHtml(ARCHITECT.getModeLabel())}</p>
    </section>

    <div class="chat-layout">
      <div class="chat-msgs" id="chat-msgs">
        <div class="chat-bubble bot">${escapeHtml(welcome)}</div>
      </div>
      <div class="chat-input-row">
        <textarea id="chat-input" class="chat-input" placeholder="Message…" rows="1"></textarea>
        <button class="btn gold" id="chat-send" style="padding:0 20px;flex-shrink:0;align-self:flex-end;">Send</button>
      </div>
    </div>
  `;

  const msgs    = $("chat-msgs");
  const input   = $("chat-input");
  const sendBtn = $("chat-send");
  const history = [];

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;
    input.value = "";
    input.style.height = "44px";

    const userBubble = document.createElement("div");
    userBubble.className = "chat-bubble user";
    userBubble.textContent = text;
    msgs.appendChild(userBubble);
    msgs.scrollTop = msgs.scrollHeight;

    history.push({ role: "user", content: text });

    // Detect & persist anything worth remembering; show a subtle indicator.
    maybeRememberFromMessage(text, userBubble);

    const loadBubble = document.createElement("div");
    loadBubble.className = "chat-bubble bot";
    loadBubble.innerHTML = `<span class="loader"></span>`;
    msgs.appendChild(loadBubble);
    msgs.scrollTop = msgs.scrollHeight;
    sendBtn.disabled = true;

    try {
      const t = todayTotals();
      const data = await api("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          // PRO: Extended butler context window — gate with isProUser() when Stripe is live
          // Free tier: last 6 messages. Pro tier: full history (no slice).
          messages: isProUser() ? history : history.slice(-6),
          mode: ARCHITECT.getMode(),
          context: {
            calories_today:  t.calories,
            protein_today:   t.protein,
            carbs_today:     t.carbs,
            fat_today:       t.fat,
            calories_target: effectiveCalTarget(),
            protein_target:  state.targets?.protein_g ?? null,
            user_name:       state.name || null,
            today_date:      today(),
            memories:        memoriesForPrompt(),
            recent_weights:  _weightEntries.slice(0, 7).map(e => ({ date: e.date, weight_kg: e.weight_kg })),
            goal_weight:     state.goals?.targetWeight || null,
            goal_type:       state.goals?.type || null,
          },
        }),
      });
      const reply = data.reply || "—";
      revealWords(loadBubble, reply, () => { msgs.scrollTop = msgs.scrollHeight; });
      history.push({ role: "assistant", content: reply });

      // Butler memory — extract durable insights from the exchange in the
      // background. Fire-and-forget: never await, never block the chat. (Julie)
      (async () => {
        try {
          await api("/api/memory/extract-chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_message: text, butler_response: reply }),
          });
          await loadMemories();
        } catch {}
      })();
    } catch (e) {
      loadBubble.textContent = `Error: ${e.message}`;
    } finally {
      sendBtn.disabled = false;
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "44px";
    input.style.height = Math.min(input.scrollHeight, 110) + "px";
  });
}

    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pw });
    if (error) {
      showErr(error.message);
      $("auth-login").disabled = false;
      return;
    }
    _session = data.session;
    await loadFromCloud();
    cleanupMemoryOnce();
    _showLogout();
    render();
  };

  const doSignup = async () => {
    const email = emailEl.value.trim();
    const pw    = pwEl.value;
    if (!email || !pw) { showErr("Please enter email and password."); return; }
    if (pw.length < 8) { showErr("Password must be at least 8 characters."); return; }
    clearState();
    $("auth-signup").disabled = true;
    const { data, error } = await _sb.auth.signUp({ email, password: pw });
    if (error) {
      const msg = error.message || "";
      if (msg.toLowerCase().includes("already registered") ||
          msg.toLowerCase().includes("already exists") ||
          msg.toLowerCase().includes("email address is already")) {
        showDuplicate();
        $("auth-signup").disabled = false;
        return;
      }
      showErr(msg);
      $("auth-signup").disabled = false;
      return;
    }
    // Supabase returns empty identities when email already exists (confirm mode)
    if (data.user && data.user.identities && data.user.identities.length === 0) {
      showDuplicate();
      $("auth-signup").disabled = false;
      return;
    }
    if (data.session) {
      _session = data.session;
      _showLogout();
      render();
    } else {
      showSuccess("Confirmation email sent — please check your inbox.");
      $("auth-signup").disabled = false;
    }
  };

  const doForgotPassword = async () => {
    const email = emailEl.value.trim();
    if (!email) { showErr("Enter your email address first."); emailEl.focus(); return; }
    clearState();
    $("auth-forgot-link").disabled = true;
    if ($("auth-dup-forgot")) $("auth-dup-forgot").disabled = true;
    try {
      await _sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
    } catch { /* network error — still show success to avoid email enumeration */ }
    showSuccess("We've sent a reset link to your email. Check your inbox.");
    $("auth-forgot-link").disabled = false;
    if ($("auth-dup-forgot")) $("auth-dup-forgot").disabled = false;
  };

  $("auth-login").addEventListener("click", doLogin);
  $("auth-signup").addEventListener("click", doSignup);
  $("auth-forgot-link").addEventListener("click", doForgotPassword);
  $("auth-dup-signin").addEventListener("click", () => { clearState(); pwEl.value = ""; pwEl.focus(); });
  $("auth-dup-forgot").addEventListener("click", doForgotPassword);
  emailEl.addEventListener("keydown", e => { if (e.key === "Enter") pwEl.focus(); });
  pwEl.addEventListener("keydown",    e => { if (e.key === "Enter") doLogin(); });

  $("auth-pw-toggle").addEventListener("click", () => {
    const show = pwEl.type === "password";
    pwEl.type = show ? "text" : "password";
    $("auth-pw-eye").innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });
}

function smoothScrollTo(targetY, duration) {
  duration = duration || 700;
  const startY = window.scrollY;
  const diff = targetY - startY;
  if (!diff) return;
  let start = null;
  function ease(t) { return t < 0.5 ? 4*t*t*t : (t-1)*(2*t-2)*(2*t-2)+1; }
  function step(ts) {
    if (!start) start = ts;
    const t = Math.min((ts - start) / duration, 1);
    window.scrollTo(0, startY + diff * ease(t));
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function setChrome(visible) {
  const nav = document.getElementById("bottom-nav");
  const hdr = document.getElementById("header-right");
  if (nav) nav.style.display = visible ? "flex" : "none";
  if (hdr) hdr.style.display = visible ? "" : "none";
}

function setBottomTab(tab) {
  ["home","butler","profile"].forEach(id => {
    const btn = document.getElementById("bnav-" + id);
    if (!btn) return;
    const becomingActive = id === tab && !btn.classList.contains("active");
    btn.classList.toggle("active", id === tab);
    if (becomingActive) {
      btn.classList.remove("nav-pop");
      void btn.offsetWidth;          // restart the animation
      btn.classList.add("nav-pop");
      btn.addEventListener("animationend", () => btn.classList.remove("nav-pop"), { once: true });
    }
  });
}

let _memoryCleanedThisSession = false;
async function cleanupMemoryOnce() {
  if (_memoryCleanedThisSession || !_session) return;
  _memoryCleanedThisSession = true;
  try { await api("/api/memory/cleanup", { method: "POST" }); } catch {}
}

async function boot() {
  try {
    const hash = window.location.hash;
    if (hash && hash.includes("type=recovery")) {
      await _sb.auth.getSession(); // lets Supabase exchange the recovery token
      renderPasswordReset();
      return;
    }
    const { data: { session } } = await _sb.auth.getSession();
    _session = session;
    if (!session) { renderAuth(); return; }
    _showLogout();
    await loadFromCloud();
    cleanupMemoryOnce();   // once-per-session prune of stale memories (fire-and-forget)
    loadMemories();        // warm the local memory cache for the Butler
    loadWeightEntries();   // warm the weight log (fire-and-forget)
    maybePatternAnalysis();// once-per-day habit promotion (fire-and-forget)
    render();
    maybeDemoHash();       // hidden URL trigger: ...#demo seeds, ...#demo-clear undoes
  } catch {
    // Network or Supabase error at boot — fall back to auth screen
    renderAuth();
  } finally {
    // The initial render decision has now been made. Any later SIGNED_IN event
    // (re-login, token refresh after offline) may safely trigger a recovery render.
    _appBooted = true;
  }
}

boot();
