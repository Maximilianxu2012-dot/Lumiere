// â”€â”€ The Ledger â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Caloric ledger modeled on a private bank's transaction book.
// Each entry is a debit; running balance shows kcal remaining vs. the
// day's budget. The footer is the day's closing balance.

function formatLedgerTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}

function ledgerRow(entry, balanceAfter) {
  const portion = entry.portion ? entry.portion.replace(/(\d+)\s*Komponenten?/, (_, n) => `${n} ${+n === 1 ? "item" : "items"}`) : "";
  const meta = `${escapeHtml(portion)} &middot; ${Math.round(entry.protein_g)}P / ${Math.round(entry.carbs_g)}C / ${Math.round(entry.fat_g)}F`;
  const expandable = entry.items && entry.items.length;
  const time = formatLedgerTime(entry.timestamp);
  const expandAttrs = expandable
    ? ` data-expandable="true" aria-expanded="false" role="button" tabindex="0"`
    : "";

  const head = `
    <div class="ledger-row" data-id="${entry.id}"${expandAttrs}>
      <div class="ledger-time">${time}</div>
      <div>
        <div class="ledger-name">${escapeHtml(entry.name)}</div>
        <div class="ledger-meta">${meta}</div>
      </div>
      <div class="ledger-debit">&#8722;${entry.calories}</div>
      <div class="ledger-balance">${balanceAfter}</div>
      <button class="ledger-del" data-id="${entry.id}" aria-label="Remove entry">×</button>
    </div>
  `;

  if (!expandable) return head;

  return head + `
    <div class="ledger-children" data-children-of="${entry.id}">
      ${entry.items.map(it => `
        <div class="ledger-child">
          <div>
            <div class="ledger-child-name">${escapeHtml(it.name)}</div>
            <div class="ledger-child-meta">${escapeHtml(it.portion)}</div>
          </div>
          <div class="ledger-child-cal">${it.calories} kcal</div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderLedger(entries, target) {
  const sorted = [...entries].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
  const dateLabel = new Date().toLocaleDateString("de-DE", {
    day: "2-digit", month: "long", year: "numeric"
  });

  let balance = target;
  const rowsHtml = sorted.length
    ? sorted.map(e => {
        balance -= e.calories;
        return ledgerRow(e, balance);
      }).join("")
    : `<div class="ledger-empty">No entries yet — the day is an empty page.</div>`;

  const status = balance < 0
    ? { cls: "over", text: `${Math.abs(balance)} kcal over budget` }
    : balance < target * 0.05
      ? { cls: "within", text: "Budget reached" }
      : { cls: "", text: `${balance} kcal available` };

  return `
    <section class="ledger" aria-label="Tagebuch">
      <header class="ledger-head">
        <div class="ledger-date">${dateLabel}</div>
        <div class="ledger-budget">Budget <b>${target}</b> kcal</div>
      </header>
      <div class="ledger-cols">
        <span>Time</span>
        <span>Entry</span>
        <span>Used</span>
        <span>Balance</span>
      </div>
      ${rowsHtml}
      ${sorted.length ? `
        <footer class="ledger-foot">
          <div class="ledger-foot-label">Balance</div>
          <div class="ledger-foot-balance">${balance}</div>
          <div class="ledger-foot-status ${status.cls}">${status.text}</div>
        </footer>
      ` : ""}
    </section>
  `;
}

function deleteEntry(id) {
  const d = today();
  state.log[d] = (state.log[d] || []).filter(e => e.id !== id);
  persist();
  renderDashboard();
}

// â”€â”€ Food scan â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// ── Barcode Scan ────────────────────────────────────────────────────
function renderBarcodeScanner() {
  app.innerHTML = `
    <div class="eyebrow" style="margin-bottom:6px;">Barcode Scan</div>
    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 20px;">
      Point the camera at a barcode — I'll look it up in the Open Food Facts database.
    </p>
    <div id="barcode-reader" style="width:100%;max-width:480px;margin:0 auto;border:1px solid var(--line);"></div>
    <div id="barcode-status" style="text-align:center;padding:16px;color:var(--ink-soft);font-size:13px;"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn ghost" id="barcode-cancel">Cancel</button>
    </div>
  `;

  $("barcode-cancel").addEventListener("click", () => {
    if (window._barcodeScanner) { window._barcodeScanner.stop().catch(() => {}); window._barcodeScanner = null; }
    renderDashboard();
  });

  const status = $("barcode-status");
  status.textContent = "Starting camera…";

  try {
    window._barcodeScanner = new Html5Qrcode("barcode-reader");
    window._barcodeScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 260, height: 120 } },
      async (barcode) => {
        status.textContent = "Checking database…";
        try {
          const data = await api("/api/scan/barcode", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ barcode }),
          });
          window._barcodeScanner.stop().catch(() => {});
          window._barcodeScanner = null;
          renderFoodReview(data);
        } catch (e) {
          if (e.message && e.message.includes("not found")) {
            // Capture current video frame from the still-open camera stream
            status.textContent = "Not in database — analysing photo instead…";
            const video = document.querySelector("#barcode-reader video");
            if (video && video.videoWidth > 0) {
              const canvas = document.createElement("canvas");
              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;
              canvas.getContext("2d").drawImage(video, 0, 0);
              window._barcodeScanner.stop().catch(() => {});
              window._barcodeScanner = null;
              canvas.toBlob(async (blob) => {
                if (!blob) { renderDashboard(); return; }
                renderLoading("Analysing photo…");
                try {
                  const fd = new FormData();
                  fd.append("image", blob, "capture.jpg");
                  const scanData = await api("/api/scan/food", { method: "POST", body: fd });
                  renderFoodReview(scanData);
                  setTimeout(() => showArchitectBriefing({
                    triggered: true, type: "barcode_fallback", severity: "info",
                    message: "Couldn't find this product in the database — nutritional values estimated from the photo.",
                  }), 800);
                } catch (err) {
                  toast(err.message);
                  renderDashboard();
                }
              }, "image/jpeg", 0.92);
            } else {
              window._barcodeScanner.stop().catch(() => {});
              window._barcodeScanner = null;
              toast("Product not found — please use photo scan");
              renderDashboard();
            }
          } else {
            window._barcodeScanner.stop().catch(() => {});
            window._barcodeScanner = null;
            toast(e.message);
            renderDashboard();
          }
        }
      },
      () => {}
    ).catch(err => {
      status.textContent = `Camera error: ${err}`;
    });
  } catch (e) {
    status.textContent = `Scanner unavailable: ${e.message}`;
  }
}

async function handleFoodScan(file) {
  renderLoading("Analysing meal…");
  try {
    const fd = new FormData();
    fd.append("image", file);
    const data = await api("/api/scan/food", { method: "POST", body: fd });
    renderFoodReview(data);
  } catch (e) {
    toast(e.message);
    renderDashboard();
  }
}

function renderFoodReview(scan) {
  const items = scan.items.map(i => ({ ...i }));
  // Default-Name: kalorienreichste Komponente — meist das Hauptgericht
  const defaultName = items.length
    ? items.reduce((a, b) => (b.calories > a.calories ? b : a)).name
    : "Mahlzeit";
  let mealName = defaultName;

  const totals = () => items.reduce((s, i) => ({
    calories: s.calories + (+i.calories || 0),
    protein_g: s.protein_g + (+i.protein_g || 0),
    carbs_g: s.carbs_g + (+i.carbs_g || 0),
    fat_g: s.fat_g + (+i.fat_g || 0),
  }), { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0 });

  const confidenceLabel = { low: "Uncertain", medium: "Likely", high: "Confident" }[scan.confidence] || scan.confidence;
  const isLow = scan.confidence === "low";

  app.innerHTML = `
    <div class="eyebrow">Scan Result</div>
    <div style="display:flex;align-items:center;gap:12px;margin:10px 0 24px;">
      <input id="meal-name" value="${escapeHtml(mealName)}"
        placeholder="Name this meal…"
        style="flex:1;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;
               border:0;border-bottom:1px solid var(--line);padding:4px 0;background:transparent;
               color:var(--ink);outline:none;">
      <span class="pill ${scan.confidence}" style="flex-shrink:0;">${confidenceLabel}</span>
    </div>

    <div class="scan-list" id="scan-list"></div>

    <div class="refine-box ${isLow ? "alert" : ""}" id="refine-box">
      <div class="refine-box-label">
        ${isLow
          ? "Not sure what this is — describe it briefly and I'll adjust the values."
          : "Something off? Describe it briefly — I'll correct it for you."}
      </div>
      <div class="refine-row">
        <input type="text" id="refine-input" class="refine-input"
          placeholder="${isLow ? "e.g. a chicken burrito with rice and sauce" : "e.g. this was actually a Margherita pizza"}">
        <button class="btn ghost" id="refine-btn" style="flex-shrink:0;padding:0 18px;">Adjust</button>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:baseline;
                padding:20px 0;border-top:1px solid var(--line);margin-top:16px;">
      <span class="eyebrow">Total</span>
      <span style="font-family:'Cormorant Garamond',serif;font-size:26px;" id="total">${totals().calories} kcal</span>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;">
      <button class="btn ghost" id="cancel">Discard</button>
      <button class="btn gold" id="save">Add to Journal</button>
    </div>
  `;

  $("meal-name").addEventListener("input", e => { mealName = e.target.value; });

  const listEl = $("scan-list");
  function paint() {
    listEl.innerHTML = items.map((item, idx) => `
      <div class="scan-item">
        <div class="scan-item-info">
          <div class="scan-item-name">${escapeHtml(item.name)}</div>
          <div class="scan-item-portion">${escapeHtml(item.portion)}</div>
        </div>
        <div class="scan-item-right">
          <span class="scan-item-kcal">${item.calories} kcal</span>
          <button class="scan-item-del" data-rm="${idx}" aria-label="Entfernen">×</button>
        </div>
      </div>
    `).join("");
    listEl.querySelectorAll("[data-rm]").forEach(b => b.addEventListener("click", () => {
      items.splice(+b.dataset.rm, 1);
      paint();
      $("total").textContent = `${totals().calories} kcal`;
    }));
  }
  paint();

  // Refine via natural language
  $("refine-btn").addEventListener("click", async () => {
    const desc = $("refine-input").value.trim();
    if (!desc) return;
    const btn = $("refine-btn");
    btn.disabled = true;
    btn.textContent = "…";
    try {
      const refined = await api("/api/scan/refine", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ original_items: items, description: desc }),
      });
      renderFoodReview({ items: refined.items, confidence: refined.confidence });
    } catch (e) {
      toast(e.message);
      btn.disabled = false;
      btn.textContent = "Adjust";
    }
  });
  $("refine-input").addEventListener("keydown", e => {
    if (e.key === "Enter") $("refine-btn").click();
  });

  $("cancel").addEventListener("click", renderDashboard);
  $("save").addEventListener("click", () => {
    if (!items.length) { toast("No components to save"); return; }
    const t = totals();
    const d = today();
    state.log[d] = state.log[d] || [];
    state.log[d].push({
      id: newId(),
      timestamp: Date.now(),
      source: "scan",
      name: (mealName || "").trim() || "Meal",
      portion: `${items.length} ${items.length === 1 ? "item" : "items"}`,
      calories: Math.round(t.calories),
      protein_g: Math.round(t.protein_g * 10) / 10,
      carbs_g: Math.round(t.carbs_g * 10) / 10,
      fat_g: Math.round(t.fat_g * 10) / 10,
      items: items.map(i => ({
        name: i.name,
        portion: i.portion,
        calories: +i.calories || 0,
        protein_g: +i.protein_g || 0,
        carbs_g: +i.carbs_g || 0,
        fat_g: +i.fat_g || 0,
      })),
    });
    persist();
    toast("Meal logged");
    renderDashboard();
    checkButler(items.map(i => ({
      name: i.name, portion: i.portion,
      calories: +i.calories || 0, protein_g: +i.protein_g || 0,
      carbs_g: +i.carbs_g || 0, fat_g: +i.fat_g || 0,
    })));
  });
}

function paintFridge() {
  const list = $("fridge-list");
  if (!state.fridge.length) {
    list.innerHTML = `<div class="log-empty" style="text-align:center;">No ingredients yet.</div>`;
  } else {
    list.innerHTML = `
      <div class="tags">
        ${state.fridge.map((ing, i) => `
          <span class="tag">${escapeHtml(ing)}<span class="x" data-rm="${i}" aria-label="Entfernen">×</span></span>
        `).join("")}
      </div>
    `;
    list.querySelectorAll("[data-rm]").forEach(x => x.addEventListener("click", () => {
      state.fridge.splice(+x.dataset.rm, 1);
      persist();
      paintFridge();
      const btn = $("make-recipe");
      if (btn) btn.disabled = state.fridge.length === 0;
    }));
  }
  const btn = $("make-recipe");
  if (btn) btn.disabled = state.fridge.length === 0;
}

async function handleFridgeScan(file) {
  const slot = $("fridge-list");
  slot.innerHTML = `<div class="log-empty" style="text-align:center;"><span class="loader"></span>Scanning contents…</div>`;
  try {
    const fd = new FormData();
    fd.append("image", file);
    const data = await api("/api/scan/fridge", { method: "POST", body: fd });
    // Menge + Name zusammenführen, damit das Modell beim Rezept Mengen respektiert
    const items = data.items.map(i => i.portion ? `${i.portion} ${i.name}` : i.name);
    state.fridge = [...new Set([...state.fridge, ...items])];
    persist();
    paintFridge();
    toast(`${items.length} ingredient${items.length === 1 ? "" : "s"} detected`);
  } catch (e) {
    toast(e.message);
    paintFridge();
  }
}

async function makeRecipe() {
  const slot = $("recipe-slot");
  slot.innerHTML = `<div class="skeleton-card"><span class="loader"></span>Composing recipe…</div>`;
  try {
    const t = todayTotals();
    const remaining = Math.max(state.targets.calories - t.calories, 300);
    const recipe = await api("/api/recipe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ingredients: state.fridge,
        targets: state.targets,
        remaining_calories: remaining,
        restrictions: state.restrictions,
        taste: state.taste,
      }),
    });
    renderRecipe(recipe);
  } catch (e) {
    slot.innerHTML = "";
    toast(e.message);
  }
}

// â”€â”€ Confirm Dialog â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function showConfirmDialog(title, message, confirmLabel = "Confirm", cancelLabel = "Cancel") {
  return new Promise((resolve) => {
    const overlay = document.createElement("div");
    overlay.className = "disclaimer-overlay";
    overlay.style.zIndex = "1100";
    overlay.innerHTML = `
      <div class="disclaimer-card anim-up">
        <h2 class="disclaimer-title">${escapeHtml(title)}</h2>
        <p class="disclaimer-text">${escapeHtml(message)}</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn ghost" id="confirm-cancel" style="min-width:120px;">${escapeHtml(cancelLabel)}</button>
          <button class="btn" id="confirm-ok"
            style="background:var(--danger);border-color:var(--danger);min-width:160px;">${escapeHtml(confirmLabel)}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector("#confirm-cancel").addEventListener("click", () => { overlay.remove(); resolve(false); });
    overlay.querySelector("#confirm-ok").addEventListener("click",     () => { overlay.remove(); resolve(true); });
  });
}

async function resetApp() {
  const confirmed = await showConfirmDialog(
    "Reset App",
    "This will permanently delete all your data. This cannot be undone.",
    "Delete Everything",
    "Cancel"
  );
  if (!confirmed) return;

  try {
    await api("/api/user/state", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({}),
    });
  } catch { /* lautlos — local reset happens regardless */ }

  try { localStorage.removeItem(STORAGE_KEY); } catch {}
  state = defaultState();
  render();
}

function hideProfilePanel() {
  const panel = document.getElementById("profile-panel");
  if (!panel) return;
  panel.classList.remove("open");
  panel.addEventListener("transitionend", () => panel.remove(), { once: true });
}

// â”€â”€ Calorie Goal Sub-screen â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  wrap.innerHTML = `

    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 8px;line-height:1.75;">

    ${state.targets ? `

        Calculated from your profile: <strong style="color:var(--ink);">${state.targets.calories} kcal</strong>
      </p>` : `<div style="margin-bottom:32px;"></div>`}

    <div class="field" style="margin-bottom:8px;">
      <label class="field-label" for="cg-input">Custom Daily Goal (kcal)</label>
      <input type="number" id="cg-input" min="800" max="5000"
        placeholder="Leave empty to use calculated"
        value="${state.customCalorieGoal || ""}"
        style="font-size:20px;">
    </div>
    <div id="cg-warning" style="font-size:12px;color:var(--danger);margin-bottom:20px;display:none;">
      Please enter a value between 800 and 5000 kcal.
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px;">
      <button class="btn" id="cg-save">Save Goal</button>
      ${state.customCalorieGoal ? `<button class="btn ghost" id="cg-clear">Reset to Calculated</button>` : ""}
    </div>

    <div style="text-align:center;padding-top:8px;border-top:1px solid var(--line-soft);">
      <button class="btn ghost" id="cg-back">← Profile</button>
    </div>
  `;

  const inp  = wrap.querySelector("#cg-input");
  const warn = wrap.querySelector("#cg-warning");

  wrap.querySelector("#cg-save").addEventListener("click", () => {
    const raw = inp.value.trim();
    if (!raw) { state.customCalorieGoal = null; persist(); toast("Goal reset to calculated"); (backFn || renderDashboard)(); return; }
    const val = parseInt(raw, 10);
    if (isNaN(val) || val < 800 || val > 5000) { warn.style.display = "block"; return; }
    warn.style.display = "none";
    state.customCalorieGoal = val; persist();
    toast(`Goal set: ${val} kcal`);
    (backFn || renderDashboard)();
  });
  inp.addEventListener("input", () => { warn.style.display = "none"; });

  const clearBtn = wrap.querySelector("#cg-clear");
  if (clearBtn) clearBtn.addEventListener("click", () => {
    state.customCalorieGoal = null; persist(); toast("Goal reset to calculated");
    (backFn || renderDashboard)();
  });

  wrap.querySelector("#cg-back").addEventListener("click", backFn || renderDashboard);
  app.innerHTML = "";
  app.appendChild(wrap);
}

// â”€â”€ Proactive Butler Check â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function checkButler(mealItems = null) {
  if (!state.targets) return;

  const d = today();
  if (!state.butlerFired || state.butlerFired.date !== d) {
    state.butlerFired = { date: d, types: [] };
  }

  const t    = todayTotals();
  const hour = new Date().getHours();

  // PRO: Health-Context Layer — gate with isProUser() when Stripe is live
  const hc = isProUser() ? state.healthContext : null;
  const healthContext = hc ? {
    diabetes_type:       hc.diabetesType || null,
    lactose_intolerant:  hc.lactoseIntolerant || false,
    gluten_intolerant:   hc.glutenIntolerant  || false,
    hypertension:        hc.hypertension       || false,
    other_notes:         hc.otherNotes         || "",
  } : null;

  try {
    const result = await api("/api/butler/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        calories_today:  t.calories,
        protein_today:   t.protein,
        carbs_today:     t.carbs,
        fat_today:       t.fat,
        calories_target: effectiveCalTarget(),
        protein_target:  state.targets.protein_g,
        carbs_target:    state.targets.carbs_g,
        hour,
        mode:        ARCHITECT.getMode(),
        user_name:   state.name || null,
        fired_today: state.butlerFired.types,
        health_context: healthContext,
        last_meal:   mealItems || [],
      }),
    });
    if (result.triggered && result.message) {
      if (result.type !== "health_context") {
        state.butlerFired.types.push(result.type);
        persist();
      }
      showArchitectBriefing(result);
    }
  } catch { /* lautlos */ }
}

// â”€â”€ Inspiration â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function makeInspiredRecipe(backFn, backLabel) {
  backFn    = backFn    || renderDashboard;
  backLabel = backLabel || "← Dashboard";
  renderLoading("Generating inspiration…");
  try {
    const recipe = await api("/api/recipe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ingredients: [],
        targets: state.targets,
        taste: state.taste,
      }),

    renderFavRecipe({ ...recipe, id: newId(), savedAt: null }, backFn, backLabel);
  } catch (e) {

// â”€â”€ Daily Briefing â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function fetchDailyBriefing() {
  if (!state.targets || state.lastBriefingDate === today()) return;
  state.lastBriefingDate = today();
  persist();

  const yDate  = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const yCals  = (state.log[yDate] || []).reduce((s, e) => s + (e.calories || 0), 0);
  const calTgt = effectiveCalTarget();
  const msg    = yCals > 0
    ? `Daily briefing. Yesterday: ${Math.round(yCals)} kcal (target ${calTgt} kcal). Today's target: ${calTgt} kcal. Brief assessment and one recommendation, max 3 sentences.`
    : `Daily briefing. Today's target: ${calTgt} kcal, ${state.targets.protein_g}g protein. Brief motivating note, max 2 sentences.`;

  try {
    const data = await api("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [{ role: "user", content: msg }],
        mode: ARCHITECT.getMode(),
        context: {
          calories_today:  0,
          calories_target: state.targets.calories,
          protein_target:  state.targets.protein_g,
          user_name:       state.name || null,
        },
      }),
    });
    showArchitectBriefing({ triggered: true, type: "daily_briefing", severity: "info", message: data.reply });
  } catch { /* lautlos ignorieren */ }
}

function renderFavorites() {
  if (!state.favorites.length) {
    app.innerHTML = `
      <section class="hero-block">
        <div class="hero-eyebrow">Lumière</div>
        <h1 class="hero-display">My Recipes</h1>
        <p class="hero-sub">No saved recipes yet.</p>
        <div class="hero-cta" style="margin-top:20px;">
          <button class="btn gold" id="fav-inspire">Get inspired</button>
          <button class="btn ghost" id="fav-back">Dashboard</button>

      </section>
    `;
    $("fav-inspire").addEventListener("click", () => makeInspiredRecipe(renderFavorites, "← My Recipes"));
    $("fav-back").addEventListener("click", renderDashboard);
    return;
  }

  app.innerHTML = `
    <section class="hero-block">
      <div class="hero-eyebrow">Lumière</div>
      <h1 class="hero-display">My Recipes</h1>
    </section>

    <div class="fav-grid">
      ${state.favorites.map(fav => {
        const q = encodeURIComponent(fav.title + ',food,gericht');
        return `
          <div class="fav-card" data-fav-id="${escapeHtml(fav.id)}">
            <img class="fav-card-img" src="https://source.unsplash.com/400x280/?${q}"
                 alt="${escapeHtml(fav.title)}" loading="lazy" onerror="this.style.display='none'">
            <div class="fav-card-body">
              <div class="fav-card-title">${escapeHtml(fav.title)}</div>
              <div class="fav-card-meta">${fav.duration_min} min · ${fav.calories_per_serving} kcal · ${fav.protein_g}g P</div>
            </div>
            <button class="fav-del" data-del-id="${escapeHtml(fav.id)}" aria-label="Remove">×</button>
          </div>
        `;
      }).join("")}
    </div>

    <div style="text-align:center;margin-top:32px;padding-bottom:16px;">
      <button class="btn ghost" id="fav-back">Dashboard</button>
    </div>
  `;

  $("fav-back").addEventListener("click", renderDashboard);

  document.querySelectorAll(".fav-card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest(".fav-del")) return;
      const fav = state.favorites.find(f => f.id === card.dataset.favId);
      if (fav) renderFavRecipe(fav);
    });
  });

  document.querySelectorAll(".fav-del").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      state.favorites = state.favorites.filter(f => f.id !== btn.dataset.delId);
      persist();
      renderFavorites();
    });
  });
}

function renderFavRecipe(r, backFn, backLabel) {
  backFn    = backFn    || renderFavorites;
  backLabel = backLabel || "← Meine Rezepte";
  const imgQuery = encodeURIComponent(r.title + ',food,gericht');
  const isSaved = state.favorites.some(f => f.id === r.id);
  app.innerHTML = `
    <div class="recipe" style="margin-top:0;">
      <img class="recipe-img" src="https://source.unsplash.com/800x400/?${imgQuery}"
           alt="${escapeHtml(r.title)}" loading="lazy" onerror="this.style.display='none'">
      <div class="recipe-head">
        <div class="eyebrow">Recipe</div>
        <h2>${escapeHtml(r.title)}</h2>
        <div class="recipe-sub">${escapeHtml(r.summary)}</div>
      </div>
      <div class="recipe-meta">
        <div class="recipe-meta-cell"><div class="recipe-meta-val">${r.duration_min}</div><div class="recipe-meta-cap">Minutes</div></div>
        <div class="recipe-meta-cell"><div class="recipe-meta-val">${r.calories_per_serving}</div><div class="recipe-meta-cap">kcal / serving</div></div>
        <div class="recipe-meta-cell"><div class="recipe-meta-val">${r.protein_g}g</div><div class="recipe-meta-cap">Protein</div></div>
        <div class="recipe-meta-cell"><div class="recipe-meta-val">${r.servings}</div><div class="recipe-meta-cap">Servings</div></div>
      </div>
      <div class="recipe-body">
        <div class="recipe-block">
          <h4>Ingredients</h4>
          <ul class="recipe-ingr">
            ${r.ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join("")}
          </ul>
        </div>
        <div class="recipe-block">
          <h4>Preparation</h4>
          <ol class="recipe-steps">
            ${r.steps.map(s => `<li>${escapeHtml(s)}</li>`).join("")}
          </ol>
        </div>
      </div>
      <div class="recipe-foot">
        <button class="btn ghost" id="fav-recipe-back">${escapeHtml(backLabel)}</button>
        <button class="btn ghost" id="fav-recipe-toggle">${isSaved ? "★ Remove" : "☆ Save"}</button>
        <button class="btn gold" id="fav-recipe-log">Log One Serving</button>
      </div>
    </div>
  `;
  $("fav-recipe-back").addEventListener("click", backFn);
  $("fav-recipe-toggle").addEventListener("click", () => {
    const idx = state.favorites.findIndex(f => f.id === r.id);
    if (idx >= 0) {
      state.favorites.splice(idx, 1);
      persist();
      toast("Removed from favorites");
      backFn();
    } else {
      state.favorites.unshift({ ...r, savedAt: Date.now() });
      persist();
      toast("Recipe saved");
      $("fav-recipe-toggle").textContent = "★ Remove";
    }
  });
  $("fav-recipe-log").addEventListener("click", () => {
    const d = today();
    state.log[d] = state.log[d] || [];
    state.log[d].push({
      id: newId(), timestamp: Date.now(), source: "recipe",
      name: r.title, portion: "1 serving",
      calories: r.calories_per_serving, protein_g: r.protein_g, carbs_g: r.carbs_g, fat_g: r.fat_g,
    });
    persist();
    toast("Meal logged");
    renderDashboard();
    checkButler([{ name: r.title, portion: "1 serving",
      calories: r.calories_per_serving, protein_g: r.protein_g,
      carbs_g: r.carbs_g, fat_g: r.fat_g }]);
  });
}

// â”€â”€ Butler Chat â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderChat() {
  const welcome = {
    ELITE_BUTLER:      "Good day. I have your current day's numbers ready — what would you like to address?",
    PERFORMANCE_COACH: "Let's go. What's your goal today? I'm direct.",
    STRATEGIC_BUDDY:   "Hey — what's on your mind? Food, macros, decisions?",
  }[ARCHITECT.getMode()] || "Ready when you are.";

  app.innerHTML = `
    <section class="hero-block" style="padding-bottom:20px;">
      <div class="hero-eyebrow">Performance Intelligence Core</div>
      <h1 class="hero-display" style="font-size:clamp(26px,3.5vw,42px);">Architect</h1>
      <p class="hero-sub" style="font-size:12px;letter-spacing:.1em;margin:0;">${escapeHtml(ARCHITECT.getModeLabel())}</p>
    </section>

    <div class="chat-layout">
      <div class="chat-msgs" id="chat-msgs">
        <div class="chat-bubble bot">${escapeHtml(welcome)}</div>
      </div>
      <div class="chat-input-row">
        <textarea id="chat-input" class="chat-input" placeholder="Nachricht eingeben…" rows="1"></textarea>
        <button class="btn gold" id="chat-send" style="padding:0 20px;flex-shrink:0;align-self:flex-end;">Senden</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:16px;">
      <button class="btn ghost" id="chat-back" style="font-size:13px;padding:0 16px;height:36px;">Dashboard</button>
    </div>
  `;

  const msgs    = $("chat-msgs");
  const input   = $("chat-input");
  const sendBtn = $("chat-send");
  const history = [];

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;
    input.value = "";
    input.style.height = "44px";

    const userBubble = document.createElement("div");
    userBubble.className = "chat-bubble user";
    userBubble.textContent = text;
    msgs.appendChild(userBubble);
    msgs.scrollTop = msgs.scrollHeight;

    history.push({ role: "user", content: text });

    const loadBubble = document.createElement("div");
    loadBubble.className = "chat-bubble bot";
    loadBubble.innerHTML = `<span class="loader"></span>`;
    msgs.appendChild(loadBubble);
    msgs.scrollTop = msgs.scrollHeight;
    sendBtn.disabled = true;

    try {
      const t = todayTotals();
      const data = await api("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          // PRO: Extended butler context window — gate with isProUser() when Stripe is live
          // Free tier: last 6 messages. Pro tier: full history (no slice).
          messages: isProUser() ? history : history.slice(-6),
          mode: ARCHITECT.getMode(),
          context: {
            calories_today:  t.calories,
            protein_today:   t.protein,
            carbs_today:     t.carbs,
            fat_today:       t.fat,
            calories_target: effectiveCalTarget(),
            protein_target:  state.targets?.protein_g ?? null,
            user_name:       state.name || null,
          },
        }),
      });
      const reply = data.reply || "—";
      loadBubble.textContent = reply;
      history.push({ role: "assistant", content: reply });
    } catch (e) {
      loadBubble.textContent = `Fehler: ${e.message}`;
    } finally {
      sendBtn.disabled = false;
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "44px";
    input.style.height = Math.min(input.scrollHeight, 110) + "px";
  });
  $("chat-back").addEventListener("click", renderDashboard);
}

// â”€â”€ Auth Screen â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderAuth() {
  if ($("logout-btn")) $("logout-btn").style.display = "none";
  app.innerHTML = `
    <section class="hero-block">
      <div class="hero-eyebrow">Lumière</div>
      <h1 class="hero-display">Welcome</h1>
      <p class="hero-sub">Sign in to save your data securely and access it from anywhere.</p>
    </section>

    <div style="max-width:380px;margin:32px auto 0;">
      <div class="field">
        <label class="field-label" for="auth-email">Email</label>
        <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field" style="margin-top:16px;">
        <label class="field-label" for="auth-pw">Password</label>
        <input type="password" id="auth-pw" placeholder="At least 6 characters" autocomplete="current-password">
      </div>
      <div id="auth-err" style="color:var(--danger);font-size:13px;margin-top:10px;min-height:16px;line-height:1.4;"></div>
      <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
        <button class="btn gold" id="auth-login">Sign In</button>
        <button class="btn ghost" id="auth-signup">Create Account</button>
      </div>
    </div>
  `;

  const errEl  = $("auth-err");
  const emailEl = $("auth-email");
  const pwEl    = $("auth-pw");

  const doLogin = async () => {
    const email = emailEl.value.trim();
    const pw    = pwEl.value;
    if (!email || !pw) { errEl.textContent = "Please enter email and password."; return; }
    errEl.textContent = "";
    $("auth-login").disabled = true;
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pw });
    if (error) {
      errEl.textContent = error.message;
      $("auth-login").disabled = false;
      return;
    }
    _session = data.session;
    await loadFromCloud();
    _showLogout();
    render();
  };

  const doSignup = async () => {
    const email = emailEl.value.trim();
    const pw    = pwEl.value;
    if (!email || !pw) { errEl.textContent = "Please enter email and password."; return; }
    if (pw.length < 6) { errEl.textContent = "Password must be at least 6 characters."; return; }
    errEl.textContent = "";
    $("auth-signup").disabled = true;
    const { data, error } = await _sb.auth.signUp({ email, password: pw });
    if (error) {
      errEl.textContent = error.message;
      $("auth-signup").disabled = false;
      return;
    }
    if (data.session) {
      _session = data.session;
      _showLogout();
      render();
    } else {
      errEl.style.color = "var(--gold-deep)";
      errEl.textContent = "Confirmation email sent — please check your inbox.";
      $("auth-signup").disabled = false;
    }
  };

  $("auth-login").addEventListener("click", doLogin);
  $("auth-signup").addEventListener("click", doSignup);
  emailEl.addEventListener("keydown", e => { if (e.key === "Enter") pwEl.focus(); });
  pwEl.addEventListener("keydown",    e => { if (e.key === "Enter") doLogin(); });
}

function _showLogout() { /* logout moved to profile panel */ }

// â”€â”€ Boot â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
$("arch-dismiss").addEventListener("click", () => {
  $("arch-panel").classList.remove("show");
});

async function boot() {
  const { data: { session } } = await _sb.auth.getSession();
  _session = session;
  if (!session) { renderAuth(); return; }
  _showLogout();
  await loadFromCloud();
  render();
}

boot();
</script>
